name: Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without v prefix)'
        required: true
        default: '2.2.0'
  push:
    tags:
      - 'v*'

env:
  PACKAGE_NAME: ultimate-linux-suite

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev debhelper devscripts fakeroot

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build Debian package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p build/debian && cd build/debian
          mkdir -p ${PACKAGE_NAME}-${VERSION}
          cp -r ../../ultimate.sh ../../lib ../../modules ../../menus ../../backends ../../apps ../../configs ../../drivers ../../README.md ../../CHANGELOG.md ../../LICENSE ${PACKAGE_NAME}-${VERSION}/
          tar czf ${PACKAGE_NAME}_${VERSION}.orig.tar.gz ${PACKAGE_NAME}-${VERSION}
          cp -r ../../debian ${PACKAGE_NAME}-${VERSION}/
          cd ${PACKAGE_NAME}-${VERSION}
          sed -i "1s/.*/${PACKAGE_NAME} (${VERSION}-1) unstable; urgency=medium/" debian/changelog
          dpkg-buildpackage -us -uc -b
          cd .. && mkdir -p ../../artifacts && mv *.deb ../../artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: artifacts/*.deb

  build-rpm-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - run: dnf install -y rpm-build rpmdevtools
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
      - name: Build RPM
        run: |
          VERSION=${{ steps.version.outputs.version }}
          rpmdev-setuptree
          mkdir -p ${PACKAGE_NAME}-${VERSION}
          cp -r ultimate.sh lib modules menus backends apps configs drivers README.md CHANGELOG.md LICENSE ${PACKAGE_NAME}-${VERSION}/
          tar czf ~/rpmbuild/SOURCES/${PACKAGE_NAME}-${VERSION}.tar.gz ${PACKAGE_NAME}-${VERSION}
          cp packaging/rpm/${PACKAGE_NAME}.spec ~/rpmbuild/SPECS/
          sed -i "s/^Version:.*/Version:        ${VERSION}/" ~/rpmbuild/SPECS/${PACKAGE_NAME}.spec
          rpmbuild -bb ~/rpmbuild/SPECS/${PACKAGE_NAME}.spec
          mkdir -p artifacts && mv ~/rpmbuild/RPMS/noarch/*.rpm artifacts/
          cd artifacts && for f in *.rpm; do mv "$f" "${f%.rpm}.fedora.rpm"; done
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora
          path: artifacts/*.rpm

  build-rpm-opensuse:
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed:latest
    steps:
      - uses: actions/checkout@v4
      - run: zypper install -y rpm-build rpmdevtools
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
      - name: Build RPM
        run: |
          VERSION=${{ steps.version.outputs.version }}
          rpmdev-setuptree
          mkdir -p ${PACKAGE_NAME}-${VERSION}
          cp -r ultimate.sh lib modules menus backends apps configs drivers README.md CHANGELOG.md LICENSE ${PACKAGE_NAME}-${VERSION}/
          tar czf ~/rpmbuild/SOURCES/${PACKAGE_NAME}-${VERSION}.tar.gz ${PACKAGE_NAME}-${VERSION}
          cp packaging/opensuse/${PACKAGE_NAME}.spec ~/rpmbuild/SPECS/
          sed -i "s/^Version:.*/Version:        ${VERSION}/" ~/rpmbuild/SPECS/${PACKAGE_NAME}.spec
          rpmbuild -bb ~/rpmbuild/SPECS/${PACKAGE_NAME}.spec
          mkdir -p artifacts && mv ~/rpmbuild/RPMS/noarch/*.rpm artifacts/
          cd artifacts && for f in *.rpm; do mv "$f" "${f%.rpm}.opensuse.rpm"; done
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-opensuse
          path: artifacts/*.rpm

  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - run: pacman -Syu --noconfirm && pacman -S --noconfirm base-devel sudo git
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
      - name: Build Arch package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          mkdir -p /build && cp -r . /build/source && chown -R builder:builder /build
          cd /build && mkdir -p ${PACKAGE_NAME}-${VERSION}
          cp -r source/ultimate.sh source/lib source/modules source/menus source/backends source/apps source/configs source/drivers source/README.md source/CHANGELOG.md source/LICENSE ${PACKAGE_NAME}-${VERSION}/
          tar czf ${PACKAGE_NAME}-${VERSION}.tar.gz ${PACKAGE_NAME}-${VERSION}
          mkdir -p pkg && cp source/packaging/arch/PKGBUILD pkg/
          cp source/packaging/arch/*.install pkg/ 2>/dev/null || true
          mv ${PACKAGE_NAME}-${VERSION}.tar.gz pkg/
          cd pkg
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s|source=.*|source=(\"${PACKAGE_NAME}-${VERSION}.tar.gz\")|" PKGBUILD
          [ ! -f ${PACKAGE_NAME}.install ] && echo -e 'post_install() { echo "Installed!"; }\npost_upgrade() { echo "Upgraded!"; }' > ${PACKAGE_NAME}.install
          chown -R builder:builder /build/pkg
          su builder -c "cd /build/pkg && makepkg -sf --noconfirm --skipchecksums"
          mkdir -p /build/artifacts && mv /build/pkg/*.pkg.tar.zst /build/artifacts/
          cp -r /build/artifacts ${GITHUB_WORKSPACE}/
      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: artifacts/*.pkg.tar.zst

  release:
    needs: [build-deb, build-rpm-fedora, build-rpm-opensuse, build-arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: packages
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - run: mkdir -p release-packages && find packages -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pkg.tar.zst" \) -exec mv {} release-packages/ \;
      - uses: softprops/action-gh-release@v1
        with:
          name: "Ultimate Linux Suite v${{ steps.version.outputs.version }}"
          files: release-packages/*
