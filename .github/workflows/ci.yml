name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Bash syntax
        run: |
          echo "Checking all shell scripts..."
          find . -name "*.sh" -type f | while read f; do
            if bash -n "$f" 2>&1; then
              echo "OK: $f"
            else
              echo "FAIL: $f"
              exit 1
            fi
          done

      - name: Verify source imports
        run: |
          echo "Checking all source imports exist..."
          for f in lib/*.sh modules/*.sh menus/*.sh apps/*.sh; do
            if [ -f "$f" ]; then
              echo "EXISTS: $f"
            else
              echo "MISSING: $f"
              exit 1
            fi
          done

      - name: Test --help output
        run: |
          bash ultimate.sh --help

      - name: Test --version output
        run: |
          bash ultimate.sh --version

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck -x -s bash ultimate.sh lib/*.sh modules/*.sh menus/*.sh apps/*.sh backends/*.sh || true
        continue-on-error: true

  test-debian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test on Debian/Ubuntu
        run: |
          bash -n ultimate.sh
          bash ultimate.sh --version
          echo "Debian/Ubuntu test passed"

  test-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test on Fedora
        run: |
          bash -n ultimate.sh
          bash ultimate.sh --version
          echo "Fedora test passed"

  test-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test on Arch
        run: |
          bash -n ultimate.sh
          bash ultimate.sh --version
          echo "Arch test passed"

  test-opensuse:
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test on openSUSE
        run: |
          bash -n ultimate.sh
          bash ultimate.sh --version
          echo "openSUSE test passed"

  test-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bash
        run: apk add --no-cache bash

      - name: Test on Alpine
        run: |
          bash -n ultimate.sh
          bash ultimate.sh --version
          echo "Alpine test passed"
