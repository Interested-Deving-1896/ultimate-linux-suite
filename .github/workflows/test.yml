name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================================
  # Shellcheck - Static Analysis
  # ============================================================================
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: './'
          ignore_paths: >-
            packaging
            examples
            test_*.sh
          additional_files: 'ultimate.sh'

  # ============================================================================
  # Syntax Check - Bash -n on all scripts
  # ============================================================================
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Bash syntax
        run: |
          echo "Checking syntax of all shell scripts..."
          failed=0
          for f in $(find . -name "*.sh" -type f ! -path "./packaging/*" ! -path "./.git/*"); do
            if ! bash -n "$f" 2>&1; then
              echo "FAILED: $f"
              failed=1
            else
              echo "OK: $f"
            fi
          done
          exit $failed

  # ============================================================================
  # Multi-Distribution Testing
  # ============================================================================
  test-matrix:
    name: Test on ${{ matrix.distro }}
    needs: [shellcheck, syntax-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian-based
          - distro: ubuntu:22.04
            family: debian
            pkg_cmd: "apt-get update && apt-get install -y bash coreutils jq"

          - distro: ubuntu:24.04
            family: debian
            pkg_cmd: "apt-get update && apt-get install -y bash coreutils jq"

          - distro: debian:12
            family: debian
            pkg_cmd: "apt-get update && apt-get install -y bash coreutils jq"

          # Fedora/RHEL
          - distro: fedora:40
            family: redhat
            pkg_cmd: "dnf install -y bash coreutils jq"

          - distro: fedora:39
            family: redhat
            pkg_cmd: "dnf install -y bash coreutils jq"

          # Arch-based
          - distro: archlinux:latest
            family: arch
            pkg_cmd: "pacman -Sy --noconfirm bash coreutils jq"

          # Alpine
          - distro: alpine:latest
            family: alpine
            pkg_cmd: "apk add bash coreutils jq"

    runs-on: ubuntu-latest
    container: ${{ matrix.distro }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.pkg_cmd }}

      - name: Test OS detection
        run: |
          source lib/os_detect.sh
          detect_os
          echo "Detected OS: $OS_ID"
          echo "Family: $OS_FAMILY"

      - name: Test logging module
        run: |
          source lib/logging.sh
          log_info "Info message test"
          log_success "Success message test"
          log_warn "Warning message test"
          log_error "Error message test"

      - name: Test hardware detection
        run: |
          source lib/hardware_detect.sh
          detect_hardware
          print_hardware_summary

      - name: Test package manager detection
        run: |
          source lib/pkg.sh
          echo "Package manager: $PKG_MANAGER"

      - name: Test state management
        run: |
          source lib/state.sh
          init_state_system
          echo "State initialized at: $STATE_FILE"

      - name: Run test suite
        run: |
          if [[ -f tests/framework.sh ]]; then
            source tests/framework.sh
            if [[ -d tests ]]; then
              for test_file in tests/test_*.sh; do
                if [[ -f "$test_file" ]]; then
                  echo "Running: $test_file"
                  source "$test_file" || true
                fi
              done
            fi
          fi

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-test:
    name: Integration Tests
    needs: [syntax-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Test module loading
        run: |
          echo "Testing all library modules can be sourced..."
          for f in lib/*.sh; do
            echo "Sourcing: $f"
            (source "$f") || echo "Warning: $f had issues"
          done
          echo "All modules sourced successfully"

      - name: Test TUI module
        run: |
          source lib/tui.sh
          echo "TUI Backend: $(tui_get_backend)"
          echo "Colors: ${TUI_COLORS[primary]} (primary)"

      - name: Test scan module
        run: |
          source lib/scan.sh
          perform_full_scan || true
          if [[ -f "$STATE_DIR/hardware_scan.json" ]]; then
            echo "Scan output:"
            cat "$STATE_DIR/hardware_scan.json"
          fi

  # ============================================================================
  # Documentation Check
  # ============================================================================
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check README exists
        run: |
          if [[ ! -f README.md ]]; then
            echo "ERROR: README.md not found"
            exit 1
          fi

      - name: Check CHANGELOG exists
        run: |
          if [[ ! -f CHANGELOG.md ]]; then
            echo "Warning: CHANGELOG.md not found"
          fi

      - name: Check LICENSE exists
        run: |
          if [[ ! -f LICENSE ]]; then
            echo "Warning: LICENSE not found"
          fi
