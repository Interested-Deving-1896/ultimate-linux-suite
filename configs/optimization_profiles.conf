# Optimization Profiles Configuration
# Ultimate Linux Suite

# Desktop Profile
[desktop]
swappiness=20
vfs_cache_pressure=50
dirty_ratio=10
dirty_background_ratio=5

# Gaming Profile
[gaming]
swappiness=10
vfs_cache_pressure=50
dirty_ratio=20
disable_watchdog=true

# Laptop Profile
[laptop]
swappiness=60
dirty_writeback_centisecs=6000
laptop_mode=5

# Server Profile
[server]
swappiness=30
file_max=2097152
somaxconn=65535
tcp_max_syn_backlog=65535
